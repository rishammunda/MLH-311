# DigitalOcean App Platform spec.
# Deploy with: doctl apps create --spec .do/app.yaml
# (or paste into the DO dashboard: Apps > Create > from this repo)
#
# Set ANTHROPIC_API_KEY as an encrypted secret in the DO dashboard.

name: sf311-live-triage
region: sfo

services:
  - name: backend
    github:
      repo: rishammunda/MLH-311
      branch: main
      deploy_on_push: true
    source_dir: backend
    environment_slug: python
    run_command: uvicorn main:app --host 0.0.0.0 --port 8080
    http_port: 8080
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SF_APP_TOKEN
        scope: RUN_TIME
        value: ""
      - key: SEED_LIMIT
        scope: RUN_TIME
        value: "40"
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${cases-db.DATABASE_URL}
      - key: ENABLE_SIMULATE_SURGE
        scope: RUN_TIME
        value: "0"
    health_check:
      http_path: /health

static_sites:
  - name: frontend
    github:
      repo: rishammunda/MLH-311
      branch: main
      deploy_on_push: true
    source_dir: frontend
    build_command: npm install && npm run build
    output_dir: dist
    catchall_document: index.html
    envs:
      # Point the frontend at the backend component. With both on one app,
      # the backend is reachable at /api (see ingress below).
      - key: VITE_API_BASE
        scope: BUILD_TIME
        value: "/api"

databases:
  - name: cases-db
    engine: PG
    version: "16"
    # A deployable demo database. Attach a Managed PostgreSQL cluster for prod;
    # docs/DEPLOY.md explains the required cluster_name change.
    production: false

ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: backend
    - match:
        path:
          prefix: /
      component:
        name: frontend
