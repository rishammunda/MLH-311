# DigitalOcean App Platform spec.
# Deploy with: doctl apps create --spec .do/app.yaml
# (or paste into the DO dashboard: Apps > Create > from this repo)
#
# Set DIGITALOCEAN_INFERENCE_KEY (a Gradient AI model access key) as an
# encrypted secret in the DO dashboard.

name: sf311-live-triage
region: sfo

services:
  - name: backend
    github:
      repo: shaazsaleem/MLH-311
      branch: main
      deploy_on_push: true
    source_dir: backend
    environment_slug: python
    run_command: uvicorn main:app --host 0.0.0.0 --port 8080
    http_port: 8080
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: DIGITALOCEAN_INFERENCE_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DO_MODEL
        scope: RUN_TIME
        value: "openai-gpt-oss-20b"
      # Demo mode: load the 396-case frozen snapshot and enable the /api/demo/*
      # call-simulation endpoints the frontend uses on stage. No live SODA
      # ingest, no external data feed needed.
      - key: DEMO_MODE
        scope: RUN_TIME
        value: "1"
      # In-memory store — the demo runs from the snapshot, so no managed DB is
      # needed (cheaper + faster to deploy).
      - key: DATABASE_URL
        scope: RUN_TIME
        value: "sqlite:///:memory:"
    health_check:
      http_path: /health

static_sites:
  - name: frontend
    github:
      repo: shaazsaleem/MLH-311
      branch: main
      deploy_on_push: true
    source_dir: frontend
    build_command: npm install && npm run build
    output_dir: dist
    catchall_document: index.html
    envs:
      # Point the frontend at the backend component. With both on one app,
      # the backend is reachable at /api (see ingress below).
      - key: VITE_API_BASE
        scope: BUILD_TIME
        value: "/api"

ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: backend
    - match:
        path:
          prefix: /
      component:
        name: frontend
